<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics - Year Profile (Linecharts)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-4 mb-5">
    <a th:href="@{/}" class="btn btn-outline-secondary mb-4">&larr; Back to Main Page</a>
    <h2 class="mb-4">Year Profile Analysis</h2>

    <div class="card mb-4 shadow-sm border-primary">
        <div class="card-header bg-primary text-white fw-bold">
            Linechart Configuration
        </div>
        <div class="card-body">
            <form action="/linecharts" method="get">
                
                <div class="row mb-3 bg-light p-3 border rounded">
                    <div class="col-md-6">
                        <label class="form-label fw-bold text-primary">Analysis Mode *</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="analysisMode" id="modeVenues" value="VENUES" 
                                   th:checked="${analysisMode == 'VENUES' or analysisMode == null}" onchange="toggleSelects()">
                            <label class="form-check-label" for="modeVenues">Total Articles Per Venue</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="analysisMode" id="modeCategories" value="CATEGORIES" 
                                   th:checked="${analysisMode == 'CATEGORIES'}" onchange="toggleSelects()">
                            <label class="form-check-label" for="modeCategories">Active Venues Per Category</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6 border-start">
                        <label class="form-label fw-bold">Venue Type *</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="venueType" id="typeConf" value="CONF" 
                                   th:checked="${selectedVenueType == 'CONF' or selectedVenueType == null}" onchange="toggleSelects()">
                            <label class="form-check-label" for="typeConf">Conferences / PrimaryFoR</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="venueType" id="typeJournal" value="JOURNAL" 
                                   th:checked="${selectedVenueType == 'JOURNAL'}" onchange="toggleSelects()">
                            <label class="form-check-label" for="typeJournal">Journals / BestSubjectArea</label>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-8" id="confSelectDiv">
                        <label class="form-label fw-bold">Select Conferences</label>
                        <select id="confIds" name="venueIds" class="form-select" multiple size="6">
                            <option th:each="conf : ${conferences}" th:value="${conf.id}" th:text="${conf.acronym}" 
                                    th:selected="${selectedVenueIds != null and analysisMode == 'VENUES' and #lists.contains(selectedVenueIds, conf.id)}"></option>
                        </select>
                    </div>
                    <div class="col-md-8" id="journalSelectDiv" style="display: none;">
                        <label class="form-label fw-bold">Select Journals</label>
                        <select id="journalIds" name="venueIds" class="form-select" multiple size="6">
                            <option th:each="journal : ${journals}" th:value="${journal.id}" th:text="${journal.title}" 
                                    th:selected="${selectedVenueIds != null and analysisMode == 'VENUES' and #lists.contains(selectedVenueIds, journal.id)}"></option>
                        </select>
                    </div>

                    <div class="col-md-8" id="primaryForSelectDiv" style="display: none;">
                        <label class="form-label fw-bold text-danger">Select Primary FoR Categories</label>
                        <select id="primaryForIds" name="primaryForNames" class="form-select border-danger" multiple size="6">
                            <option th:each="catName : ${primaryFors}" th:value="${catName}" th:text="${catName}" 
                                    th:selected="${selectedPrimaryFors != null and analysisMode == 'CATEGORIES' and #lists.contains(selectedPrimaryFors, catName)}"></option>
                        </select>
                    </div>
                    <div class="col-md-8" id="bestSubjectSelectDiv" style="display: none;">
                        <label class="form-label fw-bold text-danger">Select Best Subject Areas</label>
                        <select id="bestSubjectIds" name="bestSubjectIds" class="form-select border-danger" multiple size="6">
                            <option th:each="cat : ${bestSubjectAreas}" th:value="${cat.id}" th:text="${cat.name}" 
                                    th:selected="${selectedBestSubjects != null and analysisMode == 'CATEGORIES' and #lists.contains(selectedBestSubjects, cat.id)}"></option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <div class="row">
                            <div class="col-12 mb-3">
                                <label class="form-label fw-bold">Start Year</label>
                                <select name="startYear" class="form-select">
                                    <option value="">-- No Start Limit --</option>
                                    <option th:each="y : ${availableYears}" th:value="${y}" th:text="${y}" th:selected="${selectedStartYear == y}"></option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">End Year</label>
                                <select name="endYear" class="form-select">
                                    <option value="">-- No End Limit --</option>
                                    <option th:each="y : ${availableYears}" th:value="${y}" th:text="${y}" th:selected="${selectedEndYear == y}"></option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12 text-end">
                        <button type="submit" class="btn btn-primary px-5 fw-bold">Generate Chart</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${searchPerformed}" class="card shadow-sm">
        <div class="card-body">
            <div th:if="${#lists.isEmpty(chartData)}" class="alert alert-warning text-center">No data found for the selected filters.</div>
            <div th:if="${!#lists.isEmpty(chartData)}">
                <canvas id="multiLineChart" height="100"></canvas>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">

    function toggleSelects() {
        const modeVenues = document.getElementById('modeVenues').checked;
        const typeConf = document.getElementById('typeConf').checked;

        document.getElementById('confSelectDiv').style.display = (modeVenues && typeConf) ? 'block' : 'none';
        document.getElementById('confIds').disabled = !(modeVenues && typeConf);

        document.getElementById('journalSelectDiv').style.display = (modeVenues && !typeConf) ? 'block' : 'none';
        document.getElementById('journalIds').disabled = !(modeVenues && !typeConf);

		
        document.getElementById('primaryForSelectDiv').style.display = (!modeVenues && typeConf) ? 'block' : 'none';
        document.getElementById('primaryForIds').disabled = !(!modeVenues && typeConf);

        document.getElementById('bestSubjectSelectDiv').style.display = (!modeVenues && !typeConf) ? 'block' : 'none';
        document.getElementById('bestSubjectIds').disabled = !(!modeVenues && !typeConf);
    }
    
    window.onload = toggleSelects;

    var rawData = [[${chartData}]];
    var mode = [[${analysisMode}]];

    if (rawData && rawData.length > 0) {
        var labelsSet = new Set();
        var dataByGroup = {};

        rawData.forEach(function(item) {
            labelsSet.add(item.pub_year);
            if (!dataByGroup[item.venue_name]) {
                dataByGroup[item.venue_name] = {};
            }
            dataByGroup[item.venue_name][item.pub_year] = item.metric_count;
        });

        var chartLabels = Array.from(labelsSet).sort();
        var colors = ['#dc3545', '#0d6efd', '#198754', '#ffc107', '#6f42c1', '#fd7e14', '#20c997', '#0dcaf0'];
        var chartDatasets = [];
        var colorIndex = 0;

        for (var name in dataByGroup) {
            var dataPoints = [];
            chartLabels.forEach(function(year) {
                dataPoints.push(dataByGroup[name][year] || 0);
            });

            chartDatasets.push({
                label: name,
                data: dataPoints,
                borderColor: colors[colorIndex % colors.length],
                backgroundColor: colors[colorIndex % colors.length],
                fill: false,
                tension: 0.2,
                borderWidth: 3,
                pointRadius: 4
            });
            colorIndex++;
        }

        var ctx = document.getElementById('multiLineChart').getContext('2d');
        
        var yAxisTitle = (mode === 'VENUES') ? 'Number of Articles' : 'Number of Active Venues';
        var mainTitle = (mode === 'VENUES') ? 'Articles per Year Evolution' : 'Active Venues per Category Evolution';

        new Chart(ctx, {
            type: 'line',
            data: { labels: chartLabels, datasets: chartDatasets },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top', labels: { usePointStyle: true } },
                    title: { display: true, text: mainTitle, font: { size: 18 } }
                },
                scales: {
                    x: { title: { display: true, text: 'Publication Year', font: { weight: 'bold' } } },
                    y: { 
                        beginAtZero: true,
                        title: { display: true, text: yAxisTitle, font: { weight: 'bold' } },
                        ticks: { stepSize: 1 } 
                    }
                }
            }
        });
    }
</script>

</body>
</html>
